<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0d1117" />
  <title>ONESHOT</title>
  <link rel="stylesheet" href="style.css?v=2" />
</head>
<body>
  <div id="app">
    <canvas id="game"></canvas>

    <!-- 점수 표시 -->
    <div id="hud">
      <div id="score">0</div>
      <div id="combo"></div>
      <div id="best">BEST 0</div>
    </div>

    <!-- 남은 다트 -->
    <div id="darts"></div>

    <!-- 음소거 토글 -->
    <button id="mute" aria-label="소리 켜기/끄기">🔊</button>

    <!-- 리더보드 (게임 도중에도 보기) -->
    <button id="board-btn" aria-label="리더보드 보기">🏆</button>

    <!-- BULLSEYE 플래시 -->
    <div id="flash"></div>

    <!-- 막판(마지막 1발) 위험 비네팅 -->
    <div id="danger"></div>

    <!-- 시작 화면 -->
    <div class="panel" id="panel-start">
      <h1>ONE<span>SHOT</span></h1>
      <p><b>누르면</b> 좌우 조준 멈춤 · <b>떼면</b> 위아래 파워로 던지기</p>
      <p class="hint">🎯 <b class="gold">5발</b>로 시작 · 던질 때마다 1발 소모 · 다 떨어지면 끝!<br />정중앙 <b class="gold">BULL</b> 적중 = 100점 + 다트 <b class="gold">+2</b> + 🔥<b class="gold">화르륵</b> 대폭발 🔥</p>
      <div class="cta">탭하여 시작</div>
      <div class="start-links">
        <button class="btn ghost" id="start-board">🏆 리더보드</button>
        <button class="btn ghost" id="start-wall">💬 게시판</button>
      </div>
    </div>

    <!-- 게임 오버 화면 -->
    <div class="panel hidden" id="panel-over">
      <h2>GAME OVER</h2>
      <div class="final"><span id="final-score">0</span></div>
      <div id="final-best">BEST 0</div>
      <div id="over-goal"></div>
      <input id="name-input" type="text" maxlength="20" placeholder="닉네임 (익명)" autocomplete="off" spellcheck="false" />
      <div class="btn-row">
        <button class="btn ghost" id="over-again">다시하기</button>
        <button class="btn" id="over-submit">🏆 순위 등록</button>
      </div>
      <div id="submit-msg"></div>
    </div>

    <!-- 리더보드 화면 -->
    <div class="panel hidden" id="panel-board">
      <h2>🏆 리더보드</h2>
      <div id="board-myrank"></div>
      <div id="board-celebrate" class="celebrate hidden"></div>
      <div id="board-list" class="board-list"></div>
      <div class="btn-row">
        <button class="btn ghost" id="board-close">닫기</button>
        <button class="btn" id="board-again">다시하기</button>
      </div>
    </div>

    <!-- 익명 게시판 -->
    <div class="panel hidden" id="panel-wall">
      <h2>💬 게시판</h2>
      <div id="wall-list" class="wall-list"></div>
      <div class="wall-compose">
        <input id="wall-input" type="text" maxlength="80" placeholder="한 줄 남기기 (익명)" autocomplete="off" spellcheck="false" />
        <button class="btn" id="wall-send">남기기</button>
      </div>
      <div id="wall-msg"></div>
      <button class="btn ghost" id="wall-close">닫기</button>
    </div>
  </div>

  <script src="supabase-config.js?v=2"></script>
  <script src="game.js?v=2"></script>
  <script src="leaderboard.js?v=2"></script>
  <script src="wall.js?v=2"></script>
</body>
</html>
